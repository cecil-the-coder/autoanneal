# -- Container image
image:
  repository: ghcr.io/cecil-the-coder/autoanneal
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- Secrets
# Either provide values here (chart creates the Secret)
# or set existingSecret to reference a pre-existing one.
# For production, use existingSecret with a secrets manager.
secrets:
  # Use a pre-existing Secret instead of creating one:
  existingSecret: ""
  # Only used when existingSecret is empty:
  anthropicApiKey: ""
  githubToken: ""

# -- Global defaults (repos can override any of these)
defaults:
  maxBudget: "5.00"
  timeout: "30m"
  model: "sonnet"
  modelRecon: ""          # Per-phase model overrides (empty = use default model)
  modelAnalysis: ""
  modelImplement: ""
  modelCritic: ""
  modelPlan: ""
  maxTasks: 5
  minSeverity: "minor"
  logLevel: "info"
  dryRun: false
  setupCommand: ""
  skipAfter: 3          # Skip if no commits in skipAfter × cronInterval minutes
  cronInterval: 10      # Cron interval in minutes (used for staleness calc)
  fixCi: true           # Fix PRs with failing CI before looking for new improvements
  fixConflicts: true    # Rebase PRs with merge conflicts
  criticThreshold: 6    # Minimum critic score (1-10) to create a PR. 0 disables critic.
  improveDocs: true     # Fall back to documentation improvements when no code improvements found
  docCriticThreshold: 7 # Minimum critic score for documentation changes
  reviewPrs: false       # Review external PRs (not created by autoanneal)
  reviewFilter: "all"    # Filter for external PRs: "all", "labeled:<label>", or "recent"
  reviewFixThreshold: 7  # If critic score is below this, attempt to fix instead of just commenting
  concurrency: 3         # Maximum concurrent work items
  maxOpenPrs: 5          # Skip new analysis if this many autoanneal PRs are already open
  investigateIssues: ""  # Investigate open GitHub issues with this label (comma-separated). Empty = disabled.
  maxIssues: 2           # Maximum issues to investigate per run
  issueBudget: "3.00"    # Budget per issue investigation (USD)

# -- Optional environment variables (shared across all repos)
# Uncomment and set as needed.
env: {}
  # --- Anthropic provider (default) ---
  # ANTHROPIC_BASE_URL: ""         # Custom API endpoint (e.g. proxy/gateway)
  # ANTHROPIC_AUTH_TOKEN: ""       # Bearer token for proxy (takes precedence over API_KEY)
  # --- OpenAI-compatible provider ---
  # OPENAI_BASE_URL: ""            # Required when using OpenAI provider
  # OPENAI_API_KEY: ""             # Required when using OpenAI provider
  # --- Provider selection ---
  # AUTOANNEAL_PROVIDER: ""        # "anthropic" or "openai" (auto-detected if unset)
  # --- Debug ---
  # AUTOANNEAL_DEBUG_STREAM: "1"

# -- Repos to target
# Each entry becomes its own CronJob. The `name` field is used in
# resource names and must be DNS-safe (lowercase, alphanumeric, hyphens).
repos:
  - name: my-service
    repo: "myorg/my-service"
    schedule: "0 3 * * 1"       # Weekly Monday 3am UTC
    # Per-repo overrides (optional, fall back to defaults):
    # maxBudget: "10.00"
    # timeout: "1h"
    # model: "opus"
    # maxTasks: 3
    # minSeverity: "moderate"
    # setupCommand: "npm ci"
    # dryRun: false

# -- One-off Job mode
# Set job.enabled=true to create Jobs instead of CronJobs.
# Useful for: helm install --set job.enabled=true
job:
  enabled: false
  # Run only this repo (by name). Empty = all repos.
  repoFilter: ""

# -- CronJob settings
cronJob:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  suspend: false
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400

# -- Resource limits
resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

# -- Pod settings
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: false
  name: ""
  annotations: {}
