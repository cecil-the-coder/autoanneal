{{- if and .Values.manager.enabled .Values.manager.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "autoanneal.managerServiceAccountName" . }}
  labels:
    {{- include "autoanneal.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
  {{- with .Values.manager.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "autoanneal.fullname" . }}-manager
  labels:
    {{- include "autoanneal.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "autoanneal.fullname" . }}-manager
  labels:
    {{- include "autoanneal.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "autoanneal.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "autoanneal.managerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
