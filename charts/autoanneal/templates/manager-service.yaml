{{- if .Values.manager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autoanneal.fullname" . }}-manager
  labels:
    {{- include "autoanneal.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    {{- include "autoanneal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: manager
{{- end }}
