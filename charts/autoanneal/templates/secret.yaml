{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "autoanneal.fullname" . }}-secrets
  labels:
    {{- include "autoanneal.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  GH_TOKEN: {{ .Values.secrets.githubToken | b64enc | quote }}
{{- end }}
