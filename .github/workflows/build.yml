name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  MANAGER_IMAGE: ghcr.io/${{ github.repository }}-manager

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}-${{ matrix.suffix }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=worker-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=worker-${{ matrix.suffix }}

      - name: Build and push manager
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.manager
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }}-${{ matrix.suffix }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=manager-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=manager-${{ matrix.suffix }}

  manifest:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push worker manifests
        run: |
          docker manifest create ${{ env.IMAGE }}:${{ steps.sha.outputs.short }} \
            ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}-amd64 \
            ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}-arm64

          docker manifest create ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}-amd64 \
            ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}-arm64

          docker manifest push ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}
          docker manifest push ${{ env.IMAGE }}:latest

      - name: Create and push manager manifests
        run: |
          docker manifest create ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }} \
            ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }}-amd64 \
            ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }}-arm64

          docker manifest create ${{ env.MANAGER_IMAGE }}:latest \
            ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }}-amd64 \
            ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }}-arm64

          docker manifest push ${{ env.MANAGER_IMAGE }}:${{ steps.sha.outputs.short }}
          docker manifest push ${{ env.MANAGER_IMAGE }}:latest
